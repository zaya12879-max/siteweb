<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect - handles client-side routing
      const pathSegments = window.location.pathname.split('/').filter(Boolean);
      const basePath = '/adsdo-agency';

      // Redirect 404s to the app with the path preserved
      if (pathSegments[0] !== 'adsdo-agency') {
        // Preserve the requested path for the SPA to handle
        const redirectPath = basePath + window.location.pathname + window.location.search;
        window.location.replace(redirectPath);
      } else {
        // Already in correct path, redirect to index
        window.location.replace(basePath + '/');
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
